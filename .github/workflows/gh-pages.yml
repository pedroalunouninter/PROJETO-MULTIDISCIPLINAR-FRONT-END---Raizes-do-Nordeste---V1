# Gera a pasta `dist` com o caminho certo (VITE_BASE) e publica no ramo `gh-pages`.
# No GitHub: Settings → Pages → Build and deployment: Branch → gh-pages / (root)
name: GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Build
        working-directory: webapp
        run: |
          npm ci
          npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: webapp/dist
          force_orphan: true
